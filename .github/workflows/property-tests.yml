name: Property-Based Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  property-tests:
    name: Property-Based Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - name: Run property-based tests
        run: npm run test:property
